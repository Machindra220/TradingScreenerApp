{% extends 'base_authenticated.html' %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-4 space-y-4">

    <!-- Toolbar -->
    <div class="bg-gray-900 px-4 py-3 rounded-xl border border-gray-800 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
            <h3 class="text-xs font-black text-gray-200 uppercase tracking-wider">Telemetry Chart Engine</h3>
            <span id="active-ticker-badge"
                  class="text-[10px] bg-indigo-950 text-indigo-400 font-bold px-2 py-0.5 rounded border border-indigo-800/50 uppercase">
                Loading...
            </span>
        </div>
        <div class="flex items-center gap-2">
            <input type="text" id="ticker-search"
                   placeholder="NSE Symbol..."
                   value="{{ default_stock }}"
                   class="bg-gray-950 text-gray-200 text-[11px] font-bold uppercase tracking-tight px-3 py-1.5 rounded-lg border border-gray-800 focus:outline-none focus:border-indigo-500 w-48 transition-all"
                   onkeypress="if(event.key==='Enter') loadChartTelemetry(this.value)">
            <button onclick="loadChartTelemetry(document.getElementById('ticker-search').value)"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-black text-[10px] uppercase px-3 py-1.5 rounded-lg transition">
                Analyze
            </button>
        </div>
    </div>

    <!-- Error banner -->
    <div id="error-banner"
         class="hidden bg-red-950 border border-red-800 text-red-400 px-4 py-2 rounded-xl text-xs font-bold uppercase">
    </div>

    <!-- Chart area: price pane (70%) + RS pane (30%) stacked -->
    <div class="bg-gray-950 rounded-2xl border border-gray-800 shadow-2xl relative overflow-hidden">

        <!-- FIX 3: Split into two explicit divs so we control each pane's height
             independently. LightweightCharts v4+ removed the 'pane' option from
             addLineSeries/addAreaSeries — you must create a second chart instance
             OR use the new createPane() API (v5 only). Using two separate charts
             is the most compatible approach across v3/v4/v5. -->
        <div id="price-viewport"  class="w-full" style="height: 440px;"></div>
        <div class="border-t border-gray-800/60"></div>
        <div id="rs-viewport"     class="w-full" style="height: 180px;"></div>

        <!-- Spinner overlay -->
        <div id="chart-spinner"
             class="absolute inset-0 bg-gray-950/80 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="flex flex-col items-center gap-3">
                <span class="animate-spin text-xl">⏳</span>
                <p class="text-[9px] font-bold text-gray-500 tracking-widest uppercase">Fetching Stream Caches...</p>
            </div>
        </div>
    </div>

    <!-- Legend -->
    <div class="flex gap-4 text-[9px] font-bold uppercase text-gray-500 px-1">
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 bg-blue-500 rounded inline-block"></span>EMA 20</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 bg-amber-500 rounded inline-block"></span>EMA 200</span>
        <span class="flex items-center gap-1.5"><span class="w-3 h-1 bg-indigo-500 rounded inline-block"></span>RS vs Nifty 50</span>
        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-indigo-500 inline-block"></span>RS ≥ 90th %tile candles</span>
        <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>RS rising 4 days straight</span>
    </div>
</div>

<!-- FIX 4: Pin to v3.3.0 — the last stable version that supports the 'pane' option
     on series config AND setMarkers() on a series directly.
     Unpinned 'latest' resolved to v5 which has completely different API and broke:
       - addCandlestickSeries({pane:0/1}) — pane param removed
       - addAreaSeries({pane:1})          — same
       - layout.background.type='vertical' — not a valid type (should be 'solid')
     Pinning to 3.3.0 makes all existing series/pane code work as-is. -->
<script src="https://unpkg.com/lightweight-charts@3.3.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
let priceChart = null;
let rsChart    = null;

// FIX 5: layout.background needs type:'solid' not 'vertical' (typo in original)
// 'vertical' is not a valid background type and caused the chart background
// to render incorrectly or throw a silent internal error.
const CHART_COMMON = {
    layout: {
        background: { type: 'solid', color: '#030712' },
        textColor:  '#9CA3AF',
        fontFamily: 'Inter, sans-serif'
    },
    grid: {
        vertLines: { color: '#111827' },
        horzLines: { color: '#111827' }
    },
    crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: { color: '#4B5563', labelBackgroundColor: '#1F2937' },
        horzLine: { color: '#4B5563', labelBackgroundColor: '#1F2937' }
    },
    timeScale: { borderColor: '#1F2937', timeVisible: false }
};

function destroyCharts() {
    if (priceChart) { try { priceChart.remove(); } catch(e){} priceChart = null; }
    if (rsChart)    { try { rsChart.remove();    } catch(e){} rsChart    = null; }
}

function initCharts() {
    destroyCharts();

    const priceEl = document.getElementById('price-viewport');
    const rsEl    = document.getElementById('rs-viewport');
    priceEl.innerHTML = '';
    rsEl.innerHTML    = '';

    // Price chart — candles + EMA20 + EMA200
    priceChart = LightweightCharts.createChart(priceEl, {
        ...CHART_COMMON,
        width:  priceEl.clientWidth,
        height: 440,
        timeScale: { ...CHART_COMMON.timeScale, timeVisible: false }
    });

    // RS chart — area + underline markers
    rsChart = LightweightCharts.createChart(rsEl, {
        ...CHART_COMMON,
        width:  rsEl.clientWidth,
        height: 180,
        timeScale: { ...CHART_COMMON.timeScale, timeVisible: true }
    });

    // Sync crosshair: when you hover price chart, RS chart crosshair follows
    priceChart.subscribeCrosshairMove(param => {
        if (param.time) rsChart.setCrosshairPosition(NaN, param.time, rsLineSeries);
        else rsChart.clearCrosshairPosition();
    });

    // Sync scroll/zoom
    priceChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) rsChart.timeScale().setVisibleLogicalRange(range);
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) priceChart.timeScale().setVisibleLogicalRange(range);
    });
}

// Series refs — set during loadChartTelemetry
let candleSeries, ema20Series, ema200Series, rsLineSeries, underlineSeries;

function loadChartTelemetry(symbol) {
    if (!symbol || !symbol.trim()) return;
    symbol = symbol.trim().toUpperCase().replace(".NS", "");

    const spinner   = document.getElementById('chart-spinner');
    const errBanner = document.getElementById('error-banner');
    spinner.classList.remove('hidden');
    errBanner.classList.add('hidden');

    initCharts();

    // Create series on price chart
    candleSeries  = priceChart.addCandlestickSeries({
        upColor:        '#22C55E',
        downColor:      '#EF4444',
        borderUpColor:  '#22C55E',
        borderDownColor:'#EF4444',
        wickUpColor:    '#22C55E',
        wickDownColor:  '#EF4444'
    });
    ema20Series   = priceChart.addLineSeries({ color: '#3B82F6', lineWidth: 1, title: 'EMA 20',  lastValueVisible: false, priceLineVisible: false });
    ema200Series  = priceChart.addLineSeries({ color: '#F59E0B', lineWidth: 2, title: 'EMA 200', lastValueVisible: false, priceLineVisible: false });

    // Create series on RS chart
    rsLineSeries  = rsChart.addAreaSeries({
        lineColor:   '#6366F1',
        lineWidth:    2,
        topColor:    'rgba(99,102,241,0.25)',
        bottomColor: 'rgba(99,102,241,0.0)',
        title:       'RS vs Nifty50',
        lastValueVisible: false,
        priceLineVisible: false
    });
    underlineSeries = rsChart.addLineSeries({
        color:     '#22C55E',
        lineWidth:  0,
        lastValueVisible: false,
        priceLineVisible: false
    });

    fetch(`/api/v1/chart-telemetry/${symbol}`)
        .then(res => res.json())
        .then(data => {
            if (data.status === 'error') throw new Error(data.message);
            if (!data.series || !data.series.candles) throw new Error("Invalid data payload from server.");

            document.getElementById('active-ticker-badge').innerText =
                `${data.symbol}  ·  RS %tile: ${data.rs_percentile}`;

            // Colour candles where RS rank ≥ 90 in indigo
            const styledCandles = data.series.candles.map(c => {
                if (c.rs_pct >= 90) {
                    return {
                        time: c.time, open: c.open, high: c.high, low: c.low, close: c.close,
                        color:           '#4F46E5',
                        borderUpColor:   '#6366F1', borderDownColor: '#6366F1',
                        wickUpColor:     '#6366F1', wickDownColor:   '#6366F1'
                    };
                }
                return { time: c.time, open: c.open, high: c.high, low: c.low, close: c.close };
            });

            candleSeries.setData(styledCandles);
            ema20Series.setData(data.series.ema20   || []);
            ema200Series.setData(data.series.ema200 || []);
            rsLineSeries.setData(data.series.rs     || []);

            // RS uptrend markers on the RS pane
            if (data.series.underline && data.series.underline.length > 0) {
                const markers = data.series.underline.map(pt => ({
                    time:     pt.time,
                    position: 'belowBar',
                    color:    '#22C55E',
                    shape:    'circle',
                    size:      1
                }));
                underlineSeries.setMarkers(markers);
            }

            priceChart.timeScale().fitContent();
            rsChart.timeScale().fitContent();
            spinner.classList.add('hidden');
        })
        .catch(err => {
            spinner.classList.add('hidden');
            errBanner.innerText = `TELEMETRY FAULT: ${err.message}`;
            errBanner.classList.remove('hidden');
            document.getElementById('active-ticker-badge').innerText = "FAULT";
        });
}

// Resize both charts when window resizes
window.addEventListener('resize', () => {
    const priceEl = document.getElementById('price-viewport');
    const rsEl    = document.getElementById('rs-viewport');
    if (priceChart) priceChart.resize(priceEl.clientWidth, 440);
    if (rsChart)    rsChart.resize(rsEl.clientWidth, 180);
});

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => loadChartTelemetry("{{ default_stock }}"), 150);
});
</script>
{% endblock %}
