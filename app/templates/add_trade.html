{% extends "base_authenticated.html" %}
{% block title %}Add Trade{% endblock %}
{% block content %}

<div class="max-w-md mx-auto mt-10">
    <div class="mb-6 text-center">
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white tracking-tight">Initialize Trade</h2>
        <p class="text-gray-500 mt-1 text-xs">Enter ticker and strategy to begin.</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="h-1.5 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
        
        <form method="POST" action="{{ url_for('trades.add_trade') }}" class="p-6 space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="relative group">
                <label for="stock_name" class="block text-[10px] font-bold uppercase tracking-widest text-indigo-500 mb-1.5 ml-1">Stock Ticker</label>
                <input type="text" name="stock_name" id="stock_name" required
                       placeholder="e.g. RELIANCE"
                       class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border-2 border-gray-100 dark:border-gray-700 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none font-bold uppercase text-base placeholder:font-normal placeholder:text-gray-300 dark:text-white">
            </div>

            <div class="relative group">
                <label for="strategy_tag" class="block text-[10px] font-bold uppercase tracking-widest text-indigo-500 mb-1.5 ml-1">Strategy Tag</label>
                <div class="relative">
                    <select name="strategy_tag" id="strategy_tag" required
                            class="w-full px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border-2 border-gray-100 dark:border-gray-700 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none appearance-none font-semibold text-sm cursor-pointer dark:text-white">
                        <option value="Top-Performers">Top-Performers</option>
                        <option value="VCP">VCP</option>
                        <option value="Delivery Surge">Delivery Surge</option>
                        <option value="Earnings">Earnings</option>
                        <option value="Breakout">Breakout</option>
                        <option value="No Strategy">No Strategy</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit"
                        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 active:scale-[0.98] flex items-center justify-center">
                    <span>Create Entry</span>
                    <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </button>
                
                <div class="flex justify-center mt-5">
                    <a href="{{ url_for('trades.dashboard') }}" class="text-[11px] font-semibold text-gray-400 hover:text-indigo-600 transition-colors inline-flex items-center group">
                        <svg class="w-3 h-3 mr-1.5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        Dashboard
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}
