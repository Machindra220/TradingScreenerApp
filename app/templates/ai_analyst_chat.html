{% extends 'base_authenticated.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="mb-8 flex justify-between items-end">
        <div>
            <h2 class="text-2xl font-black text-blue-900 uppercase">🤖 VOLAR AI Analyst</h2>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Rate-Limited Protected Mode</p>
        </div>
        <span id="cooldownTimer" class="hidden bg-amber-100 text-amber-700 text-[8px] px-2 py-1 rounded-full font-black uppercase tracking-tighter animate-pulse">Cooldown: 15s</span>
    </div>

    <input type="hidden" id="csrf_token" value="{{ csrf_token }}">

    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden flex flex-col h-[600px]">
        <div id="chatWindow" class="flex-1 p-6 overflow-y-auto space-y-4 bg-gray-50/50">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-black">AI</div>
                <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tl-none max-w-[80%] text-xs font-bold shadow-sm">
                    Ready to analyze. Send button will cool down for 15s after each request to respect API limits.
                </div>
            </div>
        </div>

        <div id="loading" class="hidden px-6 py-2 text-[10px] font-black text-indigo-400 animate-pulse uppercase">Processing...</div>

        <div class="p-4 bg-white border-t border-gray-100">
            <div class="flex gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-100">
                <input type="text" id="userInput" placeholder="Ask about the scan..." class="flex-1 bg-transparent border-none focus:ring-0 text-xs font-bold px-4 py-2">
                <button id="sendBtn" onclick="sendMessage()" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function sendMessage() {
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const timer = document.getElementById('cooldownTimer');
    const chatWindow = document.getElementById('chatWindow');
    const message = input.value.trim();

    if (!message || sendBtn.disabled) return;

    // Disable button and start cooldown
    sendBtn.disabled = true;
    sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
    timer.classList.remove('hidden');

    chatWindow.innerHTML += `<div class="flex justify-end"><div class="bg-white border p-4 rounded-2xl text-xs font-bold shadow-sm">${message}</div></div>`;
    input.value = '';
    document.getElementById('loading').classList.remove('hidden');

    fetch("{{ url_for('ai_analyst.ai_chat') }}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.getElementById('csrf_token').value },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('loading').classList.add('hidden');
        const formatted = data.response.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        chatWindow.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 text-xs font-black">AI</div><div class="bg-white border p-4 rounded-2xl text-xs font-bold shadow-sm">${formatted}</div></div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Start 15s cooldown before enabling button again
        let timeLeft = 15;
        const interval = setInterval(() => {
            timeLeft--;
            timer.innerText = `Cooldown: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(interval);
                sendBtn.disabled = false;
                sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                timer.classList.add('hidden');
                timer.innerText = "Cooldown: 15s";
            }
        }, 1000);
    });
}
</script>
{% endblock %}
